<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        /* 基礎排版 */
        body { 
            font-family: -apple-system, "SF Pro TC", "Microsoft JhengHei", sans-serif; 
            line-height: 1.8; 
            max-width: 750px; 
            margin: 60px auto; 
            padding: 0 20px; 
            color: #1a1a1a; 
        }

        /* 返回連結 */
        .back { 
            display: inline-block;
            margin-bottom: 30px; 
            text-decoration: none; 
            color: #999; 
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .back:hover { color: #000; }

        /* 文章標題 */
        h1 { 
            font-size: 2.8rem; 
            font-weight: 800; 
            margin-bottom: 15px;
            letter-spacing: -1px;
            border-bottom: none; /* 確保這裡沒有線 */
        }

        /* 你想要的「> 日期」樣式 */
        .post-info {
            border-left: 4px solid #f0f0f0; /* 左側的灰色豎線 */
            padding-left: 15px;
            margin-bottom: 50px;
            color: #888;
            font-family: monospace;
            font-size: 1.1rem;
        }

        /* 文章內容區 */
        .post-content {
            font-size: 1.15rem;
            color: #333;
        }

        /* 程式碼區塊美化 */
        pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid #eee; }
        code { font-family: monospace; background: #f0f0f0; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>
    <a href="/archives/" class="back">← Back to Archives</a>

    <h1>{{ page.title }}</h1>
    
    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
    </div>

    <div class="post-content">
        {{ content }}
    </div>

</body>
</html>
