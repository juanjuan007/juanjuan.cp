<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body { 
            font-family: -apple-system, "SF Pro TC", "Microsoft JhengHei", sans-serif; 
            line-height: 1.7; 
            max-width: 700px; 
            margin: 50px auto; 
            padding: 0 20px; 
            color: #333; 
        }

        .back { 
            display: inline-block;
            margin-bottom: 20px; 
            text-decoration: none; 
            color: #bbb; 
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back:hover { color: #000; }

        /* 標題：調回原本的粗度，不使用超粗體 */
        h1 { 
            font-size: 2.2rem; 
            font-weight: 600; /* 原本的粗度感 */
            margin-bottom: 10px;
            color: #1a1a1a;
            border: none;
        }

        /* > 日期：纖細的線條與淡灰色 */
        .post-info {
            border-left: 2px solid #eee; /* 更細、更淡的線 */
            padding-left: 12px;
            margin-bottom: 40px;
            color: #aaa;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .post-content {
            font-size: 1.05rem;
            color: #333;
        }

        /* 讓內容裡的連結也優雅一點 */
        .post-content a { color: #555; text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/archives/" class="back">← Back to Archives</a>

    <h1>{{ page.title }}</h1>
    
    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
    </div>

    <div class="post-content">
        {{ content }}
    </div>
</body>
</html>
