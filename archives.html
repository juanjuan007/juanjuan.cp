---
layout: default
title: About me & Blog
---

<div class="archives-container">
  <a href="/" class="back-home">← Back</a>

  <h1>About me & Blog</h1>
  <hr>

  {% for post in site.posts %}
    <div class="post-item">
      <span class="post-date">
        {% assign post_year = post.date | date: "%Y" %}
        {% if post_year == "9999" %}
          INFO
        {% else %}
          {{ post.date | date: "%Y-%m-%d" }}
        {% endif %}
      </span>
      
      <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    </div>
  {% endfor %}
</div>

<style>
  .archives-container { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; }
  
  /* 返回按鈕樣式：對齊 post 頁面風格 */
  .back-home { 
    display: inline-block;
    margin-bottom: 25px; 
    text-decoration: none; 
    color: #bbb; 
    font-size: 0.85rem;
    transition: color 0.3s;
  }
  .back-home:hover { color: #000; }

  h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; }
  
  .post-item { margin: 15px 0; display: flex; align-items: center; }
  
  .post-date { 
    color: #999; 
    font-family: monospace; 
    margin-right: 20px; 
    font-size: 1.1rem; 
    min-width: 120px; 
    flex-shrink: 0; 
  }
  
  .post-link { color: #333; text-decoration: none; font-size: 1.2rem; font-weight: 500; transition: color 0.3s; }
  .post-link:hover { color: #000; text-decoration: underline; }
  
  hr { border: 0; border-top: 1px solid #eee; margin-bottom: 30px; }
</style>
