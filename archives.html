---
layout: default
title: Archives
---

<div class="archives-container">
  <h1>About me & Blog</h1>
  <hr>

  <div class="post-item intro-item">
    <a class="post-link" href="{{ site.baseurl }}/about/">About me</a>
  </div>


    <div class="post-item">
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    </div>
  {% endfor %}
</div>

<style>
  .archives-container { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; }
  h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; }
  .year-title { font-size: 1.8rem; margin-top: 40px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  .post-item { margin: 15px 0; display: flex; align-items: center; }
  
  /* 自我介紹項目的特殊字體顏色，使其稍微區隔但結構一致 */
  .intro-item .post-date { color: #555; font-weight: bold; }
  .intro-item .post-link { color: #007bff; }

  /* 日期樣式：調整寬度以容納 YYYY-MM-DD */
  .post-date { color: #999; font-family: monospace; margin-right: 20px; font-size: 1.1rem; min-width: 120px; }
  .post-link { color: #333; text-decoration: none; font-size: 1.2rem; font-weight: 500; transition: color 0.3s; }
  .post-link:hover { color: #000; text-decoration: underline; }
</style>
