<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juanjuan | Dev Notebook</title>
    <style>
        /* --- 基礎復位 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f2f2f2; /* 淺灰色底，襯托主白框 */
            color: #1a1a1a;
            font-family: "PingFang TC", "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- 1. 整體方格放大 --- */
        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px; /* 寬度放大到 1200px */
            background: white;
            padding: 80px; /* 內距加大，視覺更開闊 */
            box-shadow: 0 40px 100px rgba(0,0,0,0.08); /* 深層柔和陰影 */
            border-radius: 24px;
            align-items: center;
        }

        /* --- 2. 左側照片區 --- */
        .photo-side {
            flex: 1.2; /* 照片佔比稍微大一點 */
            padding-right: 80px;
            display: flex;
            justify-content: center;
        }

        .photo-frame {
            width: 100%;
            max-width: 450px; /* 長方形照片框架放大 */
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #eee; /* 照片載入前的預設底色 */
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .photo-frame:hover img {
            transform: scale(1.08); /* 懸停時照片微動態 */
        }

        /* --- 3. 右側文字選單區 --- */
        .content-side {
            flex: 1;
            border-left: 2px solid #f0f0f0; /* 分隔線 */
            padding-left: 80px;
        }

        h1 {
            font-size: 4rem; /* 標題放大 */
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: -3px;
            text-transform: uppercase;
            line-height: 0.9;
            color: #000;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            margin-bottom: 30px;
        }

        .note-item a {
            text-decoration: none;
            color: #666;
            font-size: 1.8rem; /* 選單文字放大 */
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        /* 懸停時的小動畫 */
        .note-item a::before {
            content: "";
            width: 0;
            height: 3px;
            background: #000;
            margin-right: 0;
            transition: 0.3s;
        }

        .note-item a:hover {
            color: #000;
            padding-left: 10px;
        }

        .note-item a:hover::before {
            width: 30px;
            margin-right: 15px;
        }

        /* --- 4. 響應式 (手機/平板) --- */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
                padding: 60px 40px;
                text-align: center;
                max-width: 90%;
            }
            .photo-side {
                padding-right: 0;
                margin-bottom: 50px;
            }
            .content-side {
                border-left: none;
                padding-left: 0;
                border-top: 2px solid #f0f0f0;
                padding-top: 50px;
                width: 100%;
            }
            .note-item a {
                justify-content: center;
            }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="photo-side">
            <div class="photo-frame">
                <img src="juan.jpg" alt="juanjuan">
            </div>
        </div>

        <div class="content-side">
            <h1>JUAN<br>NOTE.</h1>
            <ul class="note-list">
                <li class="note-item"><a href="pages/algorithms.html">Algorithms</a></li>
                <li class="note-item"><a href="pages/web-dev.html">Web Dev</a></li>
                <li class="note-item"><a href="pages/problem-solving.html">Solutions</a></li>
                <li class="note-item"><a href="pages/data-structures.html">Structures</a></li>
                <li class="note-item"><a href="pages/about.html">About Me</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
