<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juanjuan | Dev Notebook</title>
    <style>
        /* --- 基礎設定 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f5f5f7; /* 淺灰色背景 */
            color: #1a1a1a;
            font-family: "PingFang TC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* 1. 整體方格放大：從 1000px 變更為 1200px */
        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px; 
            background: white;
            padding: 80px; /* 內距也加深，更有高級感 */
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border-radius: 20px;
            align-items: center;
        }

        /* --- 左側照片區 --- */
        .photo-side {
            flex: 1.3; /* 照片佔據稍大部分 */
            padding-right: 80px;
            display: flex;
            justify-content: center;
        }

        .photo-frame {
            width: 100%;
            max-width: 480px; /* 照片框架顯著放大 */
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-frame:hover img {
            transform: scale(1.05); /* 懸停時稍微放大照片 */
        }

        /* --- 右側文字內容區 --- */
        .content-side {
            flex: 1;
            border-left: 3px solid #f0f0f0; /* 分隔線加粗 */
            padding-left: 80px;
        }

        h1 {
            font-size: 3.5rem; /* 標題顯著放大 */
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 1;
            color: #000;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            margin-bottom: 30px;
        }

        .note-item a {
            text-decoration: none;
            color: #666;
            font-size: 1.6rem; /* 選單文字放大 */
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
        }

        /* 懸停效果 */
        .note-item a:hover {
            color: #000;
            transform: translateX(15px);
        }

        /* --- 響應式設計 --- */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
                padding: 60px 40px;
                text-align: center;
            }
            .photo-side {
                padding-right: 0;
                margin-bottom: 50px;
            }
            .content-side {
                border-left: none;
                padding-left: 0;
                border-top: 3px solid #f0f0f0;
                padding-top: 50px;
                width: 100%;
            }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="photo-side">
            <div class="photo-frame">
                <img src="juan.jpg" alt="Juan">
            </div>
        </div>

        <div class="content-side">
            <h1>JUAN.<br>DEV LOG</h1>
            <ul class="note-list">
                <li class="note-item"><a href="pages/algorithms.html">01. ALGORITHMS</a></li>
                <li class="note-item"><a href="pages/web-dev.html">02. WEB DEV</a></li>
                <li class="note-item"><a href="pages/problem-solving.html">03. SOLUTIONS</a></li>
                <li class="note-item"><a href="pages/data-structures.html">04. STRUCTURES</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
