<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook / 080</title>
    <style>
        /* 基礎設定 */
        :root {
            --bg: #0f1115;
            --text: #e2e8f0;
            --dim: #64748b;
            --accent: #ff4d4d; /* 鮮艷的點綴色 */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "SF Mono", "Monaco", "Cascadia Code", "Fira Code", monospace;
            padding: 5vw 10vw;
            line-height: 1.2;
            overflow-x: hidden;
        }

        /* 頂部裝飾 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--dim);
            margin-bottom: 80px;
            border-bottom: 1px solid #2d3139;
            padding-bottom: 10px;
        }

        /* 標題區：非對稱排版 */
        header {
            margin-bottom: 120px;
        }

        header h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
            line-height: 0.9;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--dim);
            font-size: 1.1rem;
            max-width: 400px;
            margin-left: 5px;
        }

        /* 列表區：取消模塊感，改用條列式流動感 */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .nav-item {
            display: flex;
            align-items: baseline;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s ease;
            position: relative;
        }

        .nav-item .index {
            font-size: 0.8rem;
            color: var(--dim);
            margin-right: 20px;
        }

        .nav-item .title {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-item .desc {
            font-size: 0.9rem;
            color: var(--dim);
            margin-left: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.4s;
        }

        /* 懸停效果：文字錯位感 */
        .nav-item:hover {
            color: var(--accent);
            padding-left: 20px;
        }

        .nav-item:hover .desc {
            opacity: 1;
            transform: translateX(0);
        }

        /* 底部 */
        footer {
            margin-top: 150px;
            font-size: 12px;
            color: var(--dim);
        }

        /* 裝飾用的背景浮水文字 */
        .bg-text {
            position: fixed;
            bottom: -50px;
            right: -20px;
            font-size: 15vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .nav-item .title { font-size: 1.5rem; }
            .nav-item .desc { display: none; }
            header { margin-bottom: 60px; }
        }
    </style>
</head>
<body>

    <div class="bg-text">CODE</div>

    <div class="status-bar">
        <span>LOC: TAIWAN, TW</span>
        <span>LAST UPDATE: 2024.05.21</span>
    </div>

    <header>
        <h1>CP NOTE<span>.</span></h1>
        <p>A personal collection of algorithms, logic, and pure chaos.</p>
    </header>

    <main class="nav-list">
        <a href="algorithms.html" class="nav-item">
            <span class="index">01</span>
            <span class="title">Algorithms</span>
            <span class="desc">// 演算法與邏輯訓練</span>
        </a>

        <a href="data-struct.html" class="nav-item">
            <span class="index">02</span>
            <span class="title">Data Struct.</span>
            <span class="desc">// 抽象數據與實現</span>
        </a>

        <a href="web.html" class="nav-item">
            <span class="index">03</span>
            <span class="title">Web Lab</span>
            <span class="desc">// 前端與實驗性功能</span>
        </a>

        <a href="archive.html" class="nav-item">
            <span class="index">04</span>
            <span class="title">Archive</span>
            <span class="desc">// 過往的筆記碎片</span>
        </a>
    </main>

    <footer>
        <p>CURATED BY BRIAN / POWERED BY GITHUB PAGES</p>
    </footer>

</body>
</html>
